<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEX — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10242E; --ink-2:#182F3A;
    --amber:#F2A93B; --amber-dim: rgba(242,169,59,0.14);
    --roxo:#8B7FD6; --roxo-dim: rgba(139,127,214,0.14);
    --coral:#E15241; --coral-dim: rgba(225,82,65,0.14);
    --nevoa:#EEF2F3; --grafite:#8CA0A9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background: radial-gradient(120% 140% at 50% 0%, var(--ink-2) 0%, var(--ink) 55%, #0A1A21 100%);
    color: var(--nevoa);
    font-family:'Manrope', sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 24px;
  }
  .brand{ font-family:'Sora'; font-weight:700; font-size:26px; color:var(--amber); margin-bottom:6px; }
  .brand span{ color:var(--nevoa); }
  .tagline{ color:var(--grafite); font-size:13.5px; margin-bottom:28px; }

  .tabs{ display:flex; gap:8px; margin-bottom:18px; width:100%; max-width:360px; }
  .tab{
    flex:1; text-align:center; padding:10px 0; border-radius:10px;
    font-size:13px; font-weight:700; cursor:pointer; color:var(--grafite);
    background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  }
  .tab.active{ background: var(--amber-dim); color: var(--amber); border-color: transparent; }
  .tab.active.roxo{ background: var(--roxo-dim); color: var(--roxo); }

  .login-card{
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 30px 28px;
    width: 100%; max-width: 360px;
  }
  .field{ margin-bottom: 16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color: var(--grafite); margin-bottom:6px; }
  .field input{
    width:100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
    color: var(--nevoa); font-family:'Manrope'; font-size:14px;
  }
  .field input::placeholder{ color: rgba(238,242,243,0.3); }
  .btn-entrar{
    width:100%; padding: 13px 0; border-radius: 12px; border:none;
    background: var(--amber); color: var(--ink); font-family:'Manrope'; font-weight:700; font-size:14.5px;
    cursor:pointer; margin-top:6px;
  }
  .btn-entrar.roxo{ background: var(--roxo); color:#fff; }
  .btn-entrar:hover{ filter:brightness(1.06); }
  .btn-entrar:disabled{ opacity:0.6; cursor:default; }

  .erro{
    display:none;
    background: var(--coral-dim); color: var(--coral);
    font-size:13px; font-weight:600; padding:10px 12px; border-radius:10px; margin-bottom:14px;
  }
  .erro.show{ display:block; }

  .painel{ display:none; }
  .painel.active{ display:block; }

  .foot{ margin-top:22px; font-family:'IBM Plex Mono'; font-size:11.5px; color: rgba(238,242,243,0.3); }
</style>
</head>
<body>

  <div class="brand">WEX <span>· Controle de Ponto</span></div>
  <div class="tagline">Acesso restrito — entre com sua conta</div>

  <div class="tabs">
    <div class="tab active" id="tabEmpresa" onclick="mudarAba('empresa')">Sou uma empresa</div>
    <div class="tab" id="tabSuper" onclick="mudarAba('super')">Super Admin</div>
  </div>

  <!-- LOGIN EMPRESA (CNPJ/CPF) -->
  <div class="login-card painel active" id="painelEmpresa">
    <div class="erro" id="erroEmpresa">CNPJ/CPF ou senha inválidos.</div>
    <div class="field"><label>CNPJ ou CPF</label><input id="empDoc" inputmode="numeric" placeholder="Somente números"></div>
    <div class="field"><label>Senha</label><input id="empSenha" type="password" placeholder="••••••••"></div>
    <button class="btn-entrar" id="btnEmpresa" onclick="loginEmpresa()">Entrar</button>
  </div>

  <!-- LOGIN SUPER ADMIN (e-mail) -->
  <div class="login-card painel" id="painelSuper">
    <div class="erro" id="erroSuper">E-mail ou senha inválidos.</div>
    <div class="field"><label>E-mail</label><input id="supEmail" type="email" placeholder="voce@wex.com"></div>
    <div class="field"><label>Senha</label><input id="supSenha" type="password" placeholder="••••••••"></div>
    <button class="btn-entrar roxo" id="btnSuper" onclick="loginSuper()">Entrar</button>
    <div style="text-align:center; font-size:12px; color:var(--grafite); margin:14px 0;">ou</div>
    <button class="btn-entrar roxo" id="btnGoogle" style="background:transparent; border:1px solid rgba(255,255,255,0.15); color:var(--nevoa); display:flex; align-items:center; justify-content:center; gap:8px;" onclick="loginGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
  </div>

  <div class="foot">WEX v0.1 · sessões são pessoais, não compartilhe seu acesso</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence,
    GoogleAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAS43HPHKSRKf25HZ4xGME3qM9QiCdFcTs",
    authDomain: "wex-next.firebaseapp.com",
    projectId: "wex-next",
    storageBucket: "wex-next.firebasestorage.app",
    messagingSenderId: "174281438850",
    appId: "1:174281438850:web:b3747c683582564576669b"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function docParaEmail(valor){
    const digitos = valor.replace(/\D/g, '');
    return `doc${digitos}@wex.login`;
  }

  window.mudarAba = function(qual){
    document.getElementById('tabEmpresa').classList.toggle('active', qual==='empresa');
    document.getElementById('tabSuper').classList.toggle('active', qual==='super');
    document.getElementById('tabSuper').classList.toggle('roxo', qual==='super');
    document.getElementById('painelEmpresa').classList.toggle('active', qual==='empresa');
    document.getElementById('painelSuper').classList.toggle('active', qual==='super');
  };

  window.loginEmpresa = async function(){
    const docValor = document.getElementById('empDoc').value.trim();
    const senha = document.getElementById('empSenha').value;
    const erroBox = document.getElementById('erroEmpresa');
    const btn = document.getElementById('btnEmpresa');
    erroBox.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Entrando…';

    try {
      await setPersistence(auth, browserLocalPersistence);
      const cred = await signInWithEmailAndPassword(auth, docParaEmail(docValor), senha);
      const perfilSnap = await getDoc(doc(db, 'usuarios', cred.user.uid));
      if(!perfilSnap.exists() || perfilSnap.data().role !== 'admin'){
        throw new Error('sem-perfil');
      }
      window.location.href = 'wex-admin.html';
    } catch(e){
      erroBox.textContent = e.message === 'sem-perfil'
        ? 'Essa conta não tem um perfil de empresa configurado.'
        : 'CNPJ/CPF ou senha inválidos.';
      erroBox.classList.add('show');
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  };

  window.loginSuper = async function(){
    const email = document.getElementById('supEmail').value.trim();
    const senha = document.getElementById('supSenha').value;
    const erroBox = document.getElementById('erroSuper');
    const btn = document.getElementById('btnSuper');
    erroBox.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Entrando…';

    try {
      await setPersistence(auth, browserLocalPersistence);
      const cred = await signInWithEmailAndPassword(auth, email, senha);
      const perfilSnap = await getDoc(doc(db, 'usuarios', cred.user.uid));
      if(!perfilSnap.exists() || perfilSnap.data().role !== 'super_admin'){
        throw new Error('sem-perfil');
      }
      window.location.href = 'wex-superadmin.html';
    } catch(e){
      erroBox.textContent = e.message === 'sem-perfil'
        ? 'Essa conta não tem perfil de Super Admin.'
        : 'E-mail ou senha inválidos.';
      erroBox.classList.add('show');
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  };

  window.loginGoogle = async function(){
    const erroBox = document.getElementById('erroSuper');
    erroBox.classList.remove('show');
    try {
      await setPersistence(auth, browserLocalPersistence);
      const provider = new GoogleAuthProvider();
      const cred = await signInWithPopup(auth, provider);
      const perfilSnap = await getDoc(doc(db, 'usuarios', cred.user.uid));
      if(!perfilSnap.exists() || perfilSnap.data().role !== 'super_admin'){
        erroBox.textContent = `Conta Google autenticada (UID: ${cred.user.uid}), mas sem perfil de Super Admin ainda. Crie um documento em "usuarios/${cred.user.uid}" com role: "super_admin".`;
        erroBox.classList.add('show');
        return;
      }
      window.location.href = 'wex-superadmin.html';
    } catch(e){
      erroBox.textContent = 'Não foi possível entrar com Google: ' + e.message;
      erroBox.classList.add('show');
    }
  };
</script>
</body>
</html>
