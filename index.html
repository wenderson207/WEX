<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEX — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10242E; --ink-2:#182F3A;
    --amber:#F2A93B; --amber-dim: rgba(242,169,59,0.14);
    --coral:#E15241; --coral-dim: rgba(225,82,65,0.14);
    --nevoa:#EEF2F3; --grafite:#8CA0A9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background: radial-gradient(120% 140% at 50% 0%, var(--ink-2) 0%, var(--ink) 55%, #0A1A21 100%);
    color: var(--nevoa);
    font-family:'Manrope', sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 24px;
  }
  .brand{ font-family:'Sora'; font-weight:700; font-size:26px; color:var(--amber); margin-bottom:6px; }
  .brand span{ color:var(--nevoa); }
  .tagline{ color:var(--grafite); font-size:13.5px; margin-bottom:36px; }

  .login-card{
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 30px 28px;
    width: 100%; max-width: 360px;
  }
  .field{ margin-bottom: 16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color: var(--grafite); margin-bottom:6px; }
  .field input{
    width:100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
    color: var(--nevoa); font-family:'Manrope'; font-size:14px;
  }
  .field input::placeholder{ color: rgba(238,242,243,0.3); }
  .btn-entrar{
    width:100%; padding: 13px 0; border-radius: 12px; border:none;
    background: var(--amber); color: var(--ink); font-family:'Manrope'; font-weight:700; font-size:14.5px;
    cursor:pointer; margin-top:6px;
  }
  .btn-entrar:hover{ filter:brightness(1.06); }
  .btn-entrar:disabled{ opacity:0.6; cursor:default; }

  .erro{
    display:none;
    background: var(--coral-dim); color: var(--coral);
    font-size:13px; font-weight:600; padding:10px 12px; border-radius:10px; margin-bottom:14px;
  }
  .erro.show{ display:block; }

  .foot{ margin-top:22px; font-family:'IBM Plex Mono'; font-size:11.5px; color: rgba(238,242,243,0.3); }
</style>
</head>
<body>

  <div class="brand">WEX <span>· Controle de Ponto</span></div>
  <div class="tagline">Acesso restrito — entre com sua conta</div>

  <div class="login-card">
    <div class="erro" id="erroBox">E-mail ou senha inválidos.</div>
    <div class="field"><label>E-mail</label><input id="email" type="email" placeholder="voce@empresa.com"></div>
    <div class="field"><label>Senha</label><input id="senha" type="password" placeholder="••••••••"></div>
    <button class="btn-entrar" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
  </div>

  <div class="foot">WEX v0.1 · sessões são pessoais, não compartilhe seu acesso</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAS43HPHKSRKf25HZ4xGME3qM9QiCdFcTs",
    authDomain: "wex-next.firebaseapp.com",
    projectId: "wex-next",
    storageBucket: "wex-next.firebasestorage.app",
    messagingSenderId: "174281438850",
    appId: "1:174281438850:web:b3747c683582564576669b"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ROTAS = {
    super_admin: 'wex-superadmin.html',
    admin: 'wex-admin.html',
    funcionario: 'wex-employee.html'
  };

  window.fazerLogin = async function(){
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const erroBox = document.getElementById('erroBox');
    const btn = document.getElementById('btnEntrar');
    erroBox.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Entrando…';

    try {
      await setPersistence(auth, browserLocalPersistence);
      const cred = await signInWithEmailAndPassword(auth, email, senha);

      const usuarioSnap = await getDoc(doc(db, 'usuarios', cred.user.uid));
      if(!usuarioSnap.exists()){
        throw new Error('sem-perfil');
      }
      const { role } = usuarioSnap.data();
      const destino = ROTAS[role];
      if(!destino) throw new Error('role-invalido');

      window.location.href = destino;
    } catch(e){
      erroBox.textContent = e.message === 'sem-perfil'
        ? 'Sua conta ainda não tem um perfil configurado. Fale com o administrador.'
        : 'E-mail ou senha inválidos.';
      erroBox.classList.add('show');
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  };
</script>
</body>
</html>
